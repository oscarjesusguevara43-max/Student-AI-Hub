kind = "web"
previewPath = "/"
title = "AI Student Hub"
version = "1.0.0"
id = "artifacts/ai-student-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21450
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-student-hub run dev"

[services.env]
PORT = "21450"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-student-hub", "run", "build"]
publicDir = "artifacts/ai-student-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
